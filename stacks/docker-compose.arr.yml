name: arr
include:
  - common/docker-compose.gluetun.yml
  - common/docker-compose.volumes.yml
services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls348@sha256:4b7bb6d861c08bbf0c388b936ada8b2ba57669ca9974323f504e974577d19d63
    container_name: bazarr
    volumes:
      - ${DATA_DIR}/bazarr:/config
      - media:/media
      - ${LOG_DIR}/bazarr:/config/log
    environment:
      - PUID
      - PGID
      - TZ
    networks:
      - arr-web
    restart: unless-stopped
    labels:
      readme.description: Manage and download subtitles based on your requirements.
      readme.links.docker: https://hub.docker.com/r/linuxserver/bazarr
      readme.links.github: https://github.com/morpheus65535/bazarr
      readme.links.web: https://www.bazarr.media/
      traefik.docker.network: arr-web
      traefik.enable: true
      traefik.http.routers.bazarr.entrypoints: https
      traefik.http.routers.bazarr.middlewares: authentik
      traefik.http.routers.bazarr.rule: Host(`bazarr.${HOST}`)
      glance.name: Bazarr
      glance.icon: di:bazarr
      glance.url: https://bazarr.${HOST}
      glance.description: Subtitle Manager
      glance.category: media
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls146@sha256:a89f252d6a22bd25af14a5380aec0adcc3c3af2e3282164f981680e6844070f3
    container_name: prowlarr
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - ${DATA_DIR}/prowlarr:/config
      - ${LOG_DIR}/prowlarr:/config/logs
    environment:
      - PUID
      - PGID
      - TZ
    network_mode: service:gluetun
    restart: unless-stopped
    labels:
      readme.description: An indexer manager/proxy.
      readme.links.github: https://github.com/Prowlarr/Prowlarr
      readme.links.web: https://wiki.servarr.com/prowlarr
      traefik.docker.network: gluetun-web
      traefik.enable: true
      traefik.http.routers.prowlarr.entrypoints: https
      traefik.http.routers.prowlarr.middlewares: authentik
      traefik.http.routers.prowlarr.rule: Host(`prowlarr.${HOST}`)
      traefik.http.services.prowlarr.loadbalancer.server.port: 9696
      glance.name: Prowlarr
      glance.icon: di:prowlarr
      glance.url: https://prowlarr.${HOST}
      glance.description: Indexer Manager
      glance.category: media
  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls302@sha256:15417a594ebda4c660a9fa9748e7199d33e2d17b31bbc5ad7ba2e86f0b414763
    container_name: radarr
    volumes:
      - ${DATA_DIR}/radarr:/config
      - media:/media
      - ${LOG_DIR}/radarr:/config/logs
    environment:
      - PUID
      - PGID
      - TZ
    networks:
      - arr-web
      - gluetun
    restart: unless-stopped
    labels:
      readme.description: A fork of Sonarr to work with movies à la Couchpotato.
      readme.links.github: https://github.com/Radarr/Radarr
      traefik.docker.network: arr-web
      traefik.enable: true
      traefik.http.routers.radarr.entrypoints: https
      traefik.http.routers.radarr.middlewares: authentik
      traefik.http.routers.radarr.rule: Host(`radarr.${HOST}`)
      glance.name: Radarr
      glance.icon: di:radarr
      glance.url: https://radarr.${HOST}
      glance.description: Movie PVR System
      glance.category: media
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:5.0.3-ls254@sha256:f567ed2e26b964690e93d708d9660db011fcd0a4057f927cae1b6ec23387efd5
    container_name: sabnzbd
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - ${DATA_DIR}/sabnzbd:/config
      - media:/media
      - ${LOG_DIR}/sabnzbd:/config/logs
    environment:
      - PUID
      - PGID
      - TZ
    network_mode: service:gluetun
    restart: unless-stopped
    labels:
      readme.description: The free and easy binary newsreader.
      readme.links.docker: https://hub.docker.com/r/linuxserver/sabnzbd
      readme.links.github: https://github.com/sabnzbd/sabnzbd
      readme.links.web: https://sabnzbd.org/
      traefik.docker.network: gluetun-web
      traefik.enable: true
      traefik.http.routers.sabnzbd.entrypoints: https
      traefik.http.routers.sabnzbd.middlewares: authentik
      traefik.http.routers.sabnzbd.rule: Host(`sabnzbd.${HOST}`)
      traefik.http.services.sabnzbd.loadbalancer.server.port: 8080
      glance.name: SABnzbd
      glance.icon: di:sabnzbd
      glance.url: https://sabnzbd.${HOST}
      glance.description: Usenet Binary Newsreader
      glance.category: media
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls311@sha256:60f3b6b5c7647ba2bafd81163acfe34b11117b9b834ebd7fbcc3e5f1b309c7ef
    container_name: sonarr
    volumes:
      - ${DATA_DIR}/sonarr:/config
      - media:/media
      - ${LOG_DIR}/sonarr:/config/logs
    environment:
      - PUID
      - PGID
      - TZ
    networks:
      - arr-web
      - gluetun
    restart: unless-stopped
    labels:
      readme.description: Smart PVR for newsgroup and bittorrent users.
      readme.links.github: https://github.com/Sonarr/Sonarr
      traefik.docker.network: arr-web
      traefik.enable: true
      traefik.http.routers.sonarr.entrypoints: https
      traefik.http.routers.sonarr.middlewares: authentik
      traefik.http.routers.sonarr.rule: Host(`sonarr.${HOST}`)
      glance.name: Sonarr
      glance.icon: di:sonarr
      glance.url: https://sonarr.${HOST}
      glance.description: TV Show PVR System
      glance.category: media
  transmission:
    image: lscr.io/linuxserver/transmission:4.0.6-r4-ls291@sha256:2c277e09e5157905b798489c7161fdc08422635db091f8b55ef4f246384c3ce0
    container_name: transmission
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - ${DATA_DIR}/transmission:/config
      - media:/media
    environment:
      - PUID
      - PGID
      - TZ
      - UMASK=000
    network_mode: service:gluetun
    restart: unless-stopped
    labels:
      readme.description: Fast, easy, and free BitTorrent client.
      readme.links.github: https://github.com/transmission/transmission
      traefik.docker.network: gluetun-web
      traefik.enable: true
      traefik.http.routers.transmission.entrypoints: https
      traefik.http.routers.transmission.middlewares: authentik
      traefik.http.routers.transmission.rule: Host(`transmission.${HOST}`)
      traefik.http.services.transmission.loadbalancer.server.port: 9091
      glance.name: Transmission
      glance.icon: di:transmission
      glance.url: https://transmission.${HOST}
      glance.description: Torrent Client
      glance.category: media
networks:
  arr-web:
    name: arr-web
