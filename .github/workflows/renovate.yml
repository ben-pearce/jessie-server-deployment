name: 🤖 Automated Dependency Updates

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 6' # Every Saturday at midnight UTC

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🤫 Creating GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            server-deployment-template
            ${{ github.event.repository.name }}

      - name: 🤖 Run Renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ steps.app-token.outputs.token }}
          renovate-version: 43.220.0
        env:
          RENOVATE_AUTODISCOVER: 'true'
          RENOVATE_AUTODISCOVER_FILTER: 'server-deployment-template,${{ github.repository }}'
          RENOVATE_HOST_RULES: ${{ secrets.RENOVATE_HOST_RULES }}
          RENOVATE_PR_HOURLY_LIMIT: 20
          RENOVATE_PR_CONCURRENT_LIMIT: 20
          RENOVATE_BRANCH_CONCURRENT_LIMIT: 20
          RENOVATE_ABANDONMENT_THRESHOLD: 90 days
          RENOVATE_MINIMUM_RELEASE_AGE: 3 days
          RENOVATE_PIN_DIGESTS: true
