name: 📝 Generate README

on:
  push:
    paths:
      - '**docker-compose.yml'
      - '**docker-compose.*.yml'
      - 'README.tmpl.md'
      - '.github/workflows/generate-readme.yml'
      - '.env.example'
    branches: [ "main" ]

concurrency:
  group: push

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'chore(deps)') }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
          
      - name: 📝 Generate README
        uses: ben-pearce/server-deployment-generate-readme@5a33252605211101d9f11c34df87816e4336ccd6 # v1.2.10
        with:
          files: ./**/docker-compose*.yml
          template: .github/README.tmpl.md
